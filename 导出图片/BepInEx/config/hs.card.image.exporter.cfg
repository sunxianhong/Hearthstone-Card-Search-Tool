## HsCardImageExporter 配置文件
## 插件 GUID: hs.card.image.exporter

[General]

# 游戏启动时自动开始导出
EnableExport = true

# 导出输出目录
OutputDir = C:\Program Files (x86)\Hearthstone\BepInEx\HsCardExport\cards

# 0 表示导出全部
MaxCount = 0

# 内部渲染尺寸
RenderWidth = 1536
RenderHeight = 2304

# 缩略图尺寸
ThumbWidth = 512
ThumbHeight = 768

# 是否导出细节/详情图片
ExportDetail = false

# 细节图片尺寸
DetailWidth = 1024
DetailHeight = 1536

# 跳过已存在的文件
SkipExisting = true

# 完成后自动禁用导出标记（即自动将 EnableExport 设为 false）
AutoDisableWhenDone = true

# 额外边框填充比例
BoundsPaddingRatio = 0.08

# 透明裁剪边缘留白
TrimPadding = 6

# 预览采样模式
PreviewMode = false

# 预览模式下每种策略的采样数量
PreviewPerStrategy = 4

# 仅包含这些卡牌系列。
# 留空 = 无限制
CardSetFilter =

# 仅包含这些卡牌 ID。
# 留空 = 无限制
CardIdFilter =

# 排除这些卡牌系列
# 16 = 制作人员名单 (CREDITS)
# 18 = 乱斗模式 (TB)
# 1453 = 酒馆战棋 (BATTLEGROUNDS)
# 1586 = 佣兵战纪 (LETTUCE)
# 1705 = 佣兵战纪开发版 (MERCENARIES_DEV)
ExcludedCardSets = 16,18,1453,1586,1705

# 排除这些卡牌类型
# 6 = 结界/附魔 (ENCHANTMENT)
ExcludedCardTypes = 6

# 排除这些法术派系
# 9 = 酒馆 (TAVERN)
ExcludedSpellSchools = 9

# 多职业卡牌的可选职业上下文
CardClassContext =