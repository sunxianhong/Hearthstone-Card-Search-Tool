<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>炉石卡牌检索器</title>
    <link rel="stylesheet" href="/app.css">
    <script type="module" src="/app.js" defer></script>
</head>
<body>
    <div class="page-shell">
        <header class="hero-panel">
            <div class="hero-copy hero-header-row">
                <h1>炉石卡牌检索器</h1>
                <div class="hero-status-actions">
                    <div id="statusText" class="hero-status-text">正在加载卡牌数据…</div>
                    <button id="filterConfigButton" class="icon-button" type="button" aria-label="打开筛选栏设置" title="筛选栏设置">⚙</button>
                </div>
            </div>
        </header>

        <section class="control-panel">
            <div class="search-toolbar">
                <label class="search-field">
                    <input id="queryInput" type="text" placeholder="中文名 / 英文名 / CardID / DbfId / 标签:值 / EnumID:值">
                </label>
                <button id="searchButton" class="primary-button" type="button">筛选 / 搜索</button>
                <button id="resetButton" class="secondary-button" type="button">重置</button>
            </div>

            <div class="filter-strip">
                <label class="field compact-field">
                    <select id="modeSelect"></select>
                </label>
                <div class="field compact-field set-picker" id="setPicker">
                    <button id="setPickerButton" class="set-picker-button" type="button" aria-haspopup="listbox" aria-expanded="false">扩展包</button>
                    <div id="setPickerPanel" class="set-picker-panel is-hidden" role="listbox"></div>
                </div>
                <label class="field compact-field">
                    <select id="costSelect"></select>
                </label>
                <label class="field compact-field">
                    <select id="classSelect"></select>
                </label>
                <label class="field compact-field">
                    <select id="raritySelect"></select>
                </label>
                <label class="field compact-field">
                    <select id="cardTypeSelect"></select>
                </label>
                <label class="field compact-field">
                    <select id="raceSelect"></select>
                </label>
                <label class="field compact-field">
                    <select id="schoolSelect"></select>
                </label>
                <label class="field compact-field">
                    <select id="keywordSelect"></select>
                </label>
                <label class="field compact-field">
                    <select id="collectibleSelect"></select>
                </label>
            </div>
        </section>

        <section id="results" class="results-grid" aria-live="polite"></section>
    </div>

    <div id="detailModal" class="modal-shell is-hidden">
        <div class="modal-backdrop" data-close-modal="true"></div>
        <div id="detailModalPanel" class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="copyNameButton">
            <button id="closeModalButton" class="modal-close" type="button" aria-label="关闭详情">×</button>

            <div class="detail-layout">
                <div id="detailVisual" class="detail-visual">
                    <div class="detail-placeholder">选择一张卡牌查看详情</div>
                </div>

                <div class="detail-content">
                    <div class="detail-heading">
                        <div class="detail-title-wrap">
                            <p id="detailBadge" class="detail-badge">卡牌详情</p>
                            <button id="copyNameButton" class="detail-copyable detail-name-button" type="button">-</button>
                        </div>
                    </div>

                    <div class="detail-meta-row">
                        <span class="identity-prefix">CardID:</span>
                        <button id="copyCardIdButton" class="detail-copyable detail-id-button" type="button">-</button>
                        <span class="identity-prefix">ID:</span>
                        <button id="copyDbfIdButton" class="detail-copyable detail-id-button" type="button">-</button>
                    </div>

                    <p id="detailDescription" class="detail-description">-</p>

                    <section id="parentSection" class="detail-section is-hidden">
                        <div class="section-title">【衍生自 / 主卡牌】</div>
                        <div id="parentLinks" class="detail-link-list"></div>
                    </section>

                    <section id="relatedSection" class="detail-section is-hidden">
                        <div class="section-title">【衍生 / 相关牌】</div>
                        <div id="relatedLinks" class="detail-link-list"></div>
                    </section>

                    <section id="enchantmentSection" class="detail-section is-hidden">
                        <div class="section-title">【附魔】</div>
                        <div id="enchantmentLinks" class="detail-link-list"></div>
                    </section>
                </div>
            </div>

            <section class="tag-section">
                <div class="section-title">完整标签</div>
                <div id="tagList" class="tag-list"></div>
            </section>
        </div>
    </div>

    <div id="filterConfigModal" class="modal-shell is-hidden">
        <div class="modal-backdrop" data-close-filter-config="true"></div>
        <div id="filterConfigModalPanel" class="modal-panel settings-modal-panel" role="dialog" aria-modal="true" aria-labelledby="filterConfigTitle">
            <button id="closeFilterConfigButton" class="modal-close" type="button" aria-label="关闭筛选栏设置">×</button>

            <div class="settings-modal-layout">
                <div class="settings-modal-header">
                    <p class="detail-badge">筛选栏设置</p>
                    <h2 id="filterConfigTitle" class="settings-modal-title">自定义筛选栏显示内容</h2>
                    <p class="settings-modal-description">可以控制显示哪些筛选项，以及每个筛选项里显示哪些具体选项。</p>
                </div>

                <div class="settings-modal-body">
                    <section class="settings-section">
                        <div class="section-title">筛选项列表</div>
                        <div id="filterConfigSectionList" class="settings-placeholder">这里将显示筛选项分组配置。</div>
                    </section>

                    <section class="settings-section">
                        <div class="section-title">选项明细</div>
                        <div id="filterConfigOptionList" class="settings-placeholder">这里将显示当前筛选项下可勾选的具体选项。</div>
                    </section>
                </div>

                <div class="settings-modal-footer">
                    <button id="resetFilterConfigButton" class="secondary-button" type="button">恢复默认</button>
                    <button id="saveFilterConfigButton" class="primary-button" type="button">保存设置</button>
                </div>
            </div>
        </div>
    </div>

    <button id="backToTopButton" class="back-to-top is-hidden" type="button">置顶</button>
    <div id="copyToast" class="copy-toast is-hidden" aria-live="polite"></div>
</body>
</html>
